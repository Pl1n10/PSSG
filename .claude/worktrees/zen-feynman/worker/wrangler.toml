name = "pssg-worker"
main = "src/index.js"
compatibility_date = "2024-09-01"

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_KV"
id = "1e2ef9c3769d429bba0816348b80ab02"
preview_id = "94694f477a1945cd8057fbfeee4a6b28"
# Secrets (set via: wrangler secret put SECRET_NAME)
# GOOGLE_SERVICE_ACCOUNT_JSON  - JSON key from Google Cloud service account
# SHEET_ID                     - Google Sheets spreadsheet ID
# ALLOWED_ORIGIN               - Frontend URL (e.g. https://petsittingsgc.it)
# IP_HASH_SALT                 - Random string for hashing IPs
# EMAIL_TO                     - Admin notification recipient (e.g. info@petsittingsangiorgio.it)
# RESEND_API_KEY               - Resend API key for email notifications (re_xxxxx)
# EMAIL_FROM                   - Verified sender email (e.g. info@petsittingsangiorgio.it)

[vars]
ENVIRONMENT = "production"
